<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Manager — Azam Mustafa</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="fab" onclick="openModal()" title="Add Project">+</button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2>Naya Project Add Karein</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="fg">
                    <label>Project Title *</label>
                    <input type="text" id="m-title" placeholder="e.g. My Awesome Site">
                </div>
                <div class="fg">
                    <label>Custom Image URL (Optional)</label>
                    <input type="url" id="m-img" placeholder="Khali choren auto-favicon ke liye">
                </div>
                <div class="fg">
                    <label>Live URL</label>
                    <input type="url" id="m-live" placeholder="https://example.com">
                </div>
                <div class="fg">
                    <label>Staging URL</label>
                    <input type="url" id="m-staging" placeholder="https://staging.example.com">
                </div>
                <div class="fg">
                    <label>Developer</label>
                    <input type="text" id="m-dev" value="Muhammad Azam Mustafa">
                </div>
                <div class="modal-footer">
                    <button class="btn-clear" onclick="closeModal()">Cancel</button>
                    <button class="btn-submit" onclick="submitModal()">Save Project</button>
                </div>
            </div>
        </div>
    </div>

    <div class="page">
        <div class="hero">
            <div class="hero-left">
                <h1>All Projects</h1>
                <p>Portfolio Manager</p>
            </div>
            <div class="hero-right">
                <div class="stat">
                    <div class="stat-num" id="stat-total">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat">
                    <div class="stat-num" id="stat-live">0</div>
                    <div class="stat-label">Live</div>
                </div>
            </div>
        </div>

        <div class="grid" id="projectsGrid">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
